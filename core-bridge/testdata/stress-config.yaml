# 规则集：metacubex 推荐 .mrs 二进制规则集（geosite/geoip）
rule-providers:
  geosite-cn: {type: http, behavior: domain, format: mrs, url: 'https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geosite/cn.mrs', path: ./rules/geosite-cn.mrs, interval: 86400}
  geosite-geolocation-!cn: {type: http, behavior: domain, format: mrs, url: 'https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geosite/geolocation-!cn.mrs', path: ./rules/geosite-not-cn.mrs, interval: 86400}
  geoip-cn: {type: http, behavior: ipcidr, format: mrs, url: 'https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geoip/cn.mrs', path: ./rules/geoip-cn.mrs, interval: 86400}

rules:
  - RULE-SET,geosite-cn,DIRECT
  - RULE-SET,geoip-cn,DIRECT
  - RULE-SET,geosite-geolocation-!cn,PROXY
  - MATCH,PROXY
