# 通途 P0 内存压测 fixture（脱敏，任务 5.1 / D6）
# 60 个占位节点 + metacubex 推荐规则集结构，撑起「配置规模」内存压力（节点对象 + url-test 健康检查）。
# 出站策略由 PROXY 组首项决定，无需真实订阅即可跑满负载内存压测：
#   - 任务 5.2/5.3（内存基线 / GOMEMLIMIT 档位扫描）：PROXY 首项 = DIRECT，流量直连出站，60 节点仅驻留内存；
#   - 任务 4.6（加密出站冒烟）：把下方 lan-node 填为你局域网 Mac 的 ss 入站，并将 PROXY 首项改为 lan-node。
# 占位 node-01..60 为文档地址（203.0.113.x）不可达，仅用于内存占用，请勿期待其连通。
mixed-port: 7890
mode: rule
log-level: warning
geodata-mode: true
geodata-loader: memconservative

# DNS：metacubex 推荐 fake-ip 结构
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver: [223.5.5.5, 119.29.29.29]
  fallback: [8.8.8.8, 1.1.1.1]

