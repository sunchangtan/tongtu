# ios-poc：P0 最小验证工程（xcodegen 描述文件，任务 4.1）
# 生成：cd ios-poc && xcodegen generate
name: TongtuPoc
options:
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
# 设到当前 Xcode 版本，消除「Update to recommended settings」提醒
attributes:
  LastUpgradeCheck: "2650"
settings:
  base:
    DEVELOPMENT_TEAM: RSKBV78K2Y   # Shanghai Dingqi Technical Service Co., Ltd.
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    # Xcode 推荐设置（消除 update 提醒）
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ENABLE_STRICT_OBJC_MSGSEND: YES
    GCC_NO_COMMON_BLOCKS: YES
    CLANG_ENABLE_OBJC_WEAK: YES
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
    CLANG_WARN_UNGUARDED_AVAILABILITY: YES_AGGRESSIVE
    GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR

schemes:
  TongtuPoc:
    build:
      targets:
        TongtuPoc: all
    run:
      config: Debug

targets:
  TongtuPoc:
    type: application
    platform: iOS
    sources:
      - TongtuPoc
      - Shared
      # 压测大配置打包进 App（任务 5.2/5.3/4.6）：引用 core-bridge 单一事实源，
      # TunnelManager 在 TONGTU_STRESS=1 时从 bundle 读取它。
      - path: ../core-bridge/testdata/stress-config.yaml
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dingqi.tongtu.poc
        CODE_SIGN_ENTITLEMENTS: TongtuPoc/TongtuPoc.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
    info:
      path: TongtuPoc/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: 通途PoC
        # iPad/Designed-for-iPad 必须支持全部方向，否则报
        # "All interface orientations must be supported unless the app requires full screen"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - target: PacketTunnel
        embed: true

  PacketTunnel:
    type: app-extension
    platform: iOS
    sources: [PacketTunnel, Shared]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dingqi.tongtu.poc.packet-tunnel
        CODE_SIGN_ENTITLEMENTS: PacketTunnel/PacketTunnel.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad（与主 App 一致）
    info:
      path: PacketTunnel/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
    dependencies:
      # mihomo 内核静态库（scripts/build-xcframework.sh 产物）
      - framework: ../build/MihomoCore.xcframework
        embed: false
      # Go net 包在 Darwin 上的 DNS 解析依赖（_res_9_* 符号来自 libresolv）
      - sdk: libresolv.tbd
